name: expense-tracker

stack:
  language: TypeScript
  runtime: Node.js 22+

node_types:
  - name: module
  - name: service
  - name: library

artifacts:
  responsibility.md:
    required: always
    description: "What this node is responsible for, and what it is not"
    structural_context: true
  interface.md:
    required:
      when: has_incoming_relations
    description: "Public API — methods, parameters, return types"
    structural_context: true
  logic.md:
    required: never
    description: "Algorithmic flow, control flow, branching logic"
  constraints.md:
    required: never
    description: "Validation rules, business rules, invariants"
    structural_context: true
  errors.md:
    required:
      when: has_incoming_relations
    description: "Failure modes, edge cases, error conditions"
    structural_context: true
  model.md:
    required: never
    description: "Data structures, schemas, entities"
  decisions.md:
    required: never
    description: "Local design decisions and rationale"

quality:
  min_artifact_length: 50
  max_direct_relations: 10
  context_budget:
    warning: 10000
    error: 20000
