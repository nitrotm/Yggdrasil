name: DriftCommands
type: library
description: "Detects and syncs divergence between graph metadata and source files via yg drift and yg drift-sync"
aspects:
  - aspect: deterministic
  - aspect: cli-command-contract

relations:
  - target: cli/core/loader
    type: uses
    consumes: [loadGraph]
  - target: cli/core/drift-detector
    type: uses
    consumes: [detectDrift, syncDriftState]

mapping:
  paths:
    - source/cli/src/cli/drift.ts
    - source/cli/src/cli/drift-sync.ts
