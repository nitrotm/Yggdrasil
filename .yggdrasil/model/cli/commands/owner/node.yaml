name: OwnerCommand
type: library
aspects: [deterministic, cli-command-contract, posix-paths]

relations:
  - target: cli/core/loader
    type: uses
    consumes: [loadGraph]
  - target: cli/utils
    type: uses
    consumes: [normalizeMappingPaths, normalizeProjectRelativePath]
  - target: cli/model
    type: uses
    consumes: [Graph, OwnerResult]

mapping:
  paths:
    - source/cli/src/cli/owner.ts
