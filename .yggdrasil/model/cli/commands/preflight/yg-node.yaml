name: PreflightCommand
type: library
description: "Unified session diagnostic combining drift, status, and validation via yg preflight"
aspects:
  - aspect: deterministic
  - aspect: cli-command-contract

relations:
  - target: cli/core/loader
    type: uses
    consumes: [loadGraph]
  - target: cli/core/validator
    type: uses
    consumes: [validate]
  - target: cli/core/drift-detector
    type: uses
    consumes: [detectDrift]
  - target: cli/utils
    type: uses
    consumes: [findYggRoot, normalizeMappingPaths]
  - target: cli/model
    type: uses
    consumes: [Graph]

mapping:
  paths:
    - source/cli/src/cli/preflight.ts
