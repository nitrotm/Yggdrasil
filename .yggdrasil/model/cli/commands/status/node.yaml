name: StatusCommand
type: library
aspects: [deterministic, cli-command-contract]

relations:
  - target: cli/core/loader
    type: uses
    consumes: [loadGraph]
  - target: cli/core/validator
    type: uses
    consumes: [validate]
  - target: cli/core/drift-detector
    type: uses
    consumes: [detectDrift]
  - target: cli/core/context
    type: uses
    consumes: [collectEffectiveAspectIds]
  - target: cli/utils
    type: uses
    consumes: [normalizeMappingPaths]
  - target: cli/model
    type: uses
    consumes: [Graph]

mapping:
  paths:
    - source/cli/src/cli/status.ts
