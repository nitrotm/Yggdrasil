name: StatusCommand
type: library
description: "Graph health overview with quality metrics via yg status"
aspects:
  - aspect: deterministic
  - aspect: cli-command-contract

relations:
  - target: cli/core/loader
    type: uses
    consumes: [loadGraph]
  - target: cli/core/validator
    type: uses
    consumes: [validate]
  - target: cli/core/drift-detector
    type: uses
    consumes: [detectDrift]
  - target: cli/core/context
    type: uses
    consumes: [collectEffectiveAspectIds]
  - target: cli/utils
    type: uses
    consumes: [normalizeMappingPaths]

mapping:
  paths:
    - source/cli/src/cli/status.ts
