name: TreeCommand
type: library
description: "Prints graph hierarchy as an indented tree with metadata via yg tree"
aspects:
  - aspect: deterministic
  - aspect: cli-command-contract

relations:
  - target: cli/core/loader
    type: uses
    consumes: [loadGraph]
  - target: cli/model
    type: uses
    consumes: [GraphNode]

mapping:
  paths:
    - source/cli/src/cli/tree.ts
