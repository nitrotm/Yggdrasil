    type: uses
    consumes: [readJournal, appendJournalEntry, archiveJournal]
  - target: cli/utils
    type: uses
    consumes: [findYggRoot]

mapping:
  paths:
    - source/cli/src/cli/journal-add.ts
    - source/cli/src/cli/journal-read.ts
    - source/cli/src/cli/journal-archive.ts
