name: IO
type: library
description: "Filesystem I/O layer for parsing graph YAML files and persisting drift state"
aspects:
  - aspect: deterministic
  - aspect: posix-paths
  - aspect: yaml-parser-contract
  - aspect: silent-missing-files

relations:
  - target: cli/model
    type: uses
    consumes:
      - YggConfig
      - ArtifactConfig
      - QualityConfig
      - NodeMeta
      - NodeAspectEntry
      - NodeMapping
      - Relation
      - RelationType
      - Artifact
      - FlowDef
      - AspectDef
      - SchemaDef
      - DriftState
      - DriftNodeState

mapping:
  paths:
    - source/cli/src/io/
