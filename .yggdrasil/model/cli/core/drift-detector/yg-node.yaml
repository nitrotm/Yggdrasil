name: DriftDetector
type: library
description: "Compares current file hashes with drift-state baseline to detect source and graph drift"
aspects:
  - aspect: deterministic
  - aspect: posix-paths

relations:
  - target: cli/io
    type: uses
    consumes: [readDriftState, writeDriftState, getCanonicalHash, getFileHashes]
  - target: cli/model
    type: uses
    consumes: [Graph, DriftReport, DriftEntry, DriftStatus, DriftNodeState]
  - target: cli/utils
    type: uses
    consumes: [normalizeMappingPaths, hashForMapping, perFileHashes]

mapping:
  paths:
    - source/cli/src/core/drift-detector.ts
