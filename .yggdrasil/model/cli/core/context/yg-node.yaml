name: ContextBuilder
type: library
description: "Assembles context packages via 5-step layer assembly: global, hierarchy, own, aspects, relational"
aspects:
  - aspect: deterministic

relations:
  - target: cli/model
    type: uses
    consumes: [Graph, GraphNode, ContextPackage, ContextLayer, ContextSection, YggConfig, AspectDef, KnowledgeItem, FlowDef, Relation]
  - target: cli/utils
    type: uses
    consumes: [normalizeMappingPaths, estimateTokens]

mapping:
  paths:
    - source/cli/src/core/context-builder.ts
    - source/cli/src/core/context-files.ts
